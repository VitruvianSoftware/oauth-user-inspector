# Default values for the OAuth User Inspector chart. Override per environment
# via the ArgoCD Application's `helm.values`.

replicaCount: 1

image:
  # OAuth User Inspector container images publish to GCP Artifact Registry (see
  # the oauth-user-inspector-deploy workflow's docker buildx push). Only the
  # CHART lives in GHCR. Set the real project/repo per env.
  repository: us-west1-docker.pkg.dev/REPLACE_PROJECT/oauth-user-inspector/app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  className: traefik
  host: ""
