# Machine-readable app metadata (#500): the single per-app source for
# ownership, deploy identity, and release model. Backstage-compatible
# Component; consumed today by tools/conformance (owner must match
# .github/CODEOWNERS) and by humans/agents doing impact analysis.
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: oauth-user-inspector
  description: OAuth/OIDC token inspector web app — Vite/React frontend + Express backend on Cloud Run, Zitadel SSO
  annotations:
    github.com/project-slug: VitruvianSoftware/vitruvian-core
    vitruvian.dev/deploy-workflow: oauth-user-inspector-deploy.yaml
    vitruvian.dev/environments: development
    vitruvian.dev/release-model: continuous-deploy
    vitruvian.dev/mirror: VitruvianSoftware/oauth-user-inspector
spec:
  type: service
  lifecycle: production
  owner: oauth-user-inspector-team
  system: vitruvian-core
